services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: playlists
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playlists_dev}
      POSTGRES_DB: playlists
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playlists"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No host ports by default — isolated from other Postgres instances

  postgres-debug:
    profiles: [debug]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: playlists
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-playlists_dev}
      POSTGRES_DB: playlists
    ports:
      - "${POSTGRES_HOST_PORT:-35432}:5432"
    networks:
      - internal

  app:
    image: ${APP_IMAGE:-playlists-app:latest}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://playlists:${POSTGRES_PASSWORD:-playlists_dev}@postgres:5432/playlists
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3456}
      NEXTAUTH_PUBLIC_URL: ${NEXTAUTH_PUBLIC_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      WS_INTERNAL_URL: http://ws:3457
      NEXT_PUBLIC_WS_PORT: "${WS_HOST_PORT:-3457}"
    ports:
      - "${HOST_PORT:-3456}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ws:
        condition: service_started
    networks:
      - internal

  ws:
    image: ${WS_IMAGE:-playlists-ws:latest}
    build:
      context: .
      dockerfile: Dockerfile.ws
    environment:
      DATABASE_URL: postgres://playlists:${POSTGRES_PASSWORD:-playlists_dev}@postgres:5432/playlists
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      WS_PORT: "3457"
    ports:
      - "${WS_HOST_PORT:-3457}:3457"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    name: ${COMPOSE_PROJECT_NAME:-playlists}_pgdata
